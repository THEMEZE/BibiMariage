<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <style>
      .fl{fill:none;stroke:#8ba5c9;stroke-width:1.2;opacity:0.7}
      .fl2{fill:none;stroke:#a8c5a0;stroke-width:1;opacity:0.6}
      .fl3{fill:none;stroke:#c4a76a;stroke-width:0.8;opacity:0.5}
      .leaf{fill:#a8c5a0;opacity:0.4}
      .petal{fill:#d4a5b0;opacity:0.35}
    </style>
  </defs>

  <!-- Top left corner bouquet -->
  <g transform="translate(20,10)">
    <!-- Main stem -->
    <path class="fl2" d="M30,160 Q35,100 60,60 Q80,30 100,10"/>
    <!-- Branch left -->
    <path class="fl2" d="M45,120 Q20,90 10,70"/>
    <!-- Branch right -->
    <path class="fl2" d="M55,100 Q80,80 90,55"/>
    <!-- Leaves -->
    <ellipse class="leaf" cx="12" cy="68" rx="10" ry="6" transform="rotate(-40,12,68)"/>
    <ellipse class="leaf" cx="92" cy="52" rx="10" ry="6" transform="rotate(30,92,52)"/>
    <ellipse class="leaf" cx="100" cy="10" rx="8" ry="5" transform="rotate(-20,100,10)"/>
    <!-- Flowers -->
    <circle class="petal" cx="10" cy="68" r="8"/>
    <circle style="fill:#d4a5b0;opacity:0.5" cx="10" cy="68" r="4"/>
    <circle class="petal" cx="100" cy="10" r="10"/>
    <circle style="fill:#e8c0c8;opacity:0.5" cx="100" cy="10" r="5"/>
    <!-- Small dots (buds) -->
    <circle style="fill:#8ba5c9;opacity:0.5" cx="62" cy="58" r="4"/>
    <circle style="fill:#8ba5c9;opacity:0.4" cx="90" cy="54" r="3"/>
    <!-- Tendrils -->
    <path class="fl3" d="M30,130 Q15,125 5,130 Q-2,135 5,140"/>
    <path class="fl3" d="M50,110 Q55,95 50,88 Q46,82 52,78"/>
  </g>

  <!-- Top right corner -->
  <g transform="translate(800,10) scale(-1,1)">
    <path class="fl2" d="M30,160 Q35,100 60,60 Q80,30 100,10"/>
    <path class="fl2" d="M45,120 Q20,90 10,70"/>
    <path class="fl2" d="M55,100 Q80,80 90,55"/>
    <ellipse class="leaf" cx="12" cy="68" rx="10" ry="6" transform="rotate(-40,12,68)"/>
    <ellipse class="leaf" cx="92" cy="52" rx="10" ry="6" transform="rotate(30,92,52)"/>
    <ellipse class="leaf" cx="100" cy="10" rx="8" ry="5" transform="rotate(-20,100,10)"/>
    <circle class="petal" cx="10" cy="68" r="8"/>
    <circle style="fill:#d4a5b0;opacity:0.5" cx="10" cy="68" r="4"/>
    <circle class="petal" cx="100" cy="10" r="10"/>
    <circle style="fill:#e8c0c8;opacity:0.5" cx="100" cy="10" r="5"/>
    <circle style="fill:#8ba5c9;opacity:0.5" cx="62" cy="58" r="4"/>
    <circle style="fill:#8ba5c9;opacity:0.4" cx="90" cy="54" r="3"/>
  </g>

  <!-- Bottom left -->
  <g transform="translate(20,600) scale(1,-1)">
    <path class="fl2" d="M30,160 Q35,100 60,60 Q80,30 100,10"/>
    <path class="fl2" d="M45,120 Q20,90 10,70"/>
    <ellipse class="leaf" cx="12" cy="68" rx="10" ry="6" transform="rotate(-40,12,68)"/>
    <ellipse class="leaf" cx="100" cy="10" rx="8" ry="5" transform="rotate(-20,100,10)"/>
    <circle class="petal" cx="10" cy="68" r="8"/>
    <circle class="petal" cx="100" cy="10" r="10"/>
    <circle style="fill:#8ba5c9;opacity:0.5" cx="62" cy="58" r="4"/>
  </g>

  <!-- Bottom right -->
  <g transform="translate(800,600) scale(-1,-1)">
    <path class="fl2" d="M30,160 Q35,100 60,60 Q80,30 100,10"/>
    <path class="fl2" d="M55,100 Q80,80 90,55"/>
    <ellipse class="leaf" cx="92" cy="52" rx="10" ry="6" transform="rotate(30,92,52)"/>
    <ellipse class="leaf" cx="100" cy="10" rx="8" ry="5" transform="rotate(-20,100,10)"/>
    <circle class="petal" cx="100" cy="10" r="10"/>
    <circle style="fill:#e8c0c8;opacity:0.5" cx="100" cy="10" r="5"/>
    <circle style="fill:#8ba5c9;opacity:0.4" cx="90" cy="54" r="3"/>
  </g>

  <!-- Center top ornament -->
  <g transform="translate(400,0)">
    <path class="fl3" d="M0,50 Q-30,30 -50,10"/>
    <path class="fl3" d="M0,50 Q30,30 50,10"/>
    <path class="fl3" d="M0,50 Q0,20 0,0"/>
    <circle style="fill:#c4a76a;opacity:0.4" cx="-50" cy="10" r="5"/>
    <circle style="fill:#c4a76a;opacity:0.4" cx="50" cy="10" r="5"/>
    <circle style="fill:#c4a76a;opacity:0.5" cx="0" cy="0" r="6"/>
  </g>

  <!-- Center bottom ornament -->
  <g transform="translate(400,600) scale(1,-1)">
    <path class="fl3" d="M0,50 Q-30,30 -50,10"/>
    <path class="fl3" d="M0,50 Q30,30 50,10"/>
    <path class="fl3" d="M0,50 Q0,20 0,0"/>
    <circle style="fill:#c4a76a;opacity:0.4" cx="-50" cy="10" r="5"/>
    <circle style="fill:#c4a76a;opacity:0.4" cx="50" cy="10" r="5"/>
    <circle style="fill:#c4a76a;opacity:0.5" cx="0" cy="0" r="6"/>
  </g>

  <!-- Scattered small flowers mid-left -->
  <g transform="translate(60,300)">
    <path class="fl2" d="M0,0 Q10,-20 5,-40"/>
    <circle class="petal" cx="5" cy="-40" r="7"/>
    <ellipse class="leaf" cx="-5" cy="-20" rx="8" ry="4" transform="rotate(-30,-5,-20)"/>
  </g>

  <!-- Scattered small flowers mid-right -->
  <g transform="translate(740,280)">
    <path class="fl2" d="M0,0 Q-10,-20 -5,-40"/>
    <circle class="petal" cx="-5" cy="-40" r="7"/>
    <ellipse class="leaf" cx="5" cy="-20" rx="8" ry="4" transform="rotate(30,5,-20)"/>
  </g>
</svg>
